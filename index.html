<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Admin Panel | KillerX HWID</title>
    
    <!-- Tailwind & Firebase -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <!-- Fonts, Icons & SweetAlert (For Premium Popups) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            color: #e2e8f0; 
            background-color: #020617; /* Very Dark Slate */
            overflow-x: hidden;
            position: relative;
        }

        /* Premium Ambient Glow Effects */
        .ambient-blob {
            position: absolute;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.5;
            animation: float 20s ease-in-out infinite;
        }
        .blob-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: rgba(99, 102, 241, 0.3); }
        .blob-2 { bottom: -10%; right: -10%; width: 60vw; height: 60vw; background: rgba(168, 85, 247, 0.2); }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(5%, 5%); }
        }

        /* Modern Glassmorphism */
        .glass-card { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.05); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .btn-primary { 
            background: linear-gradient(135deg, #4f46e5 0%, #9333ea 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            box-shadow: 0 0 20px rgba(147, 51, 234, 0.4);
            transform: translateY(-2px);
        }

        .input-premium {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .input-premium:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.2);
            background: rgba(0, 0, 0, 0.4);
        }

        /* Numpad & Pin */
        .btn-numpad {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            font-size: 1.5rem;
            font-weight: 600;
            border-radius: 1rem;
            transition: all 0.2s ease;
        }
        .btn-numpad:active {
            transform: scale(0.95);
            background: rgba(255,255,255,0.15);
        }

        .pin-dot {
            width: 16px; height: 16px;
            border-radius: 50%;
            border: 2px solid #8b5cf6;
            background: transparent;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .pin-dot.filled {
            background: #a855f7;
            box-shadow: 0 0 15px #a855f7;
            transform: scale(1.2);
        }

        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-8px, 0, 0); }
            40%, 60% { transform: translate3d(8px, 0, 0); }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #6366f1; }

        /* SweetAlert Custom Dark Theme */
        .swal2-popup { background: #0f172a !important; color: #f8fafc !important; border: 1px solid rgba(255,255,255,0.1) !important; border-radius: 1.5rem !important; }
        .swal2-title { color: #f8fafc !important; }
    </style>
</head>
<body class="min-h-screen">

    <!-- Ambient Background Blobs -->
    <div class="ambient-blob blob-1"></div>
    <div class="ambient-blob blob-2"></div>

    <!-- ================== LOGIN SCREEN ================== -->
    <div id="loginScreen" class="fixed inset-0 z-50 flex items-center justify-center bg-[#020617] backdrop-blur-sm transition-opacity duration-500">
        <div class="glass-card p-10 rounded-3xl w-full max-w-sm text-center flex flex-col items-center">
            <div class="w-16 h-16 bg-gradient-to-tr from-indigo-500 to-purple-600 rounded-2xl flex items-center justify-center mb-6 shadow-[0_0_30px_rgba(99,102,241,0.4)] rotate-3">
                <i class="fas fa-fingerprint text-3xl text-white"></i>
            </div>
            <h2 class="text-2xl font-bold mb-1 tracking-tight">Security Check</h2>
            <p class="text-slate-400 text-sm mb-8">Enter Master Passcode</p>

            <div id="pinDots" class="flex gap-5 mb-10">
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
            </div>

            <div class="grid grid-cols-3 gap-3 w-full">
                <button onclick="pressKey(1)" class="btn-numpad py-4">1</button>
                <button onclick="pressKey(2)" class="btn-numpad py-4">2</button>
                <button onclick="pressKey(3)" class="btn-numpad py-4">3</button>
                <button onclick="pressKey(4)" class="btn-numpad py-4">4</button>
                <button onclick="pressKey(5)" class="btn-numpad py-4">5</button>
                <button onclick="pressKey(6)" class="btn-numpad py-4">6</button>
                <button onclick="pressKey(7)" class="btn-numpad py-4">7</button>
                <button onclick="pressKey(8)" class="btn-numpad py-4">8</button>
                <button onclick="pressKey(9)" class="btn-numpad py-4">9</button>
                <button onclick="clearPin()" class="btn-numpad py-4 text-red-400 hover:bg-red-500/10"><i class="fas fa-backspace"></i></button>
                <button onclick="pressKey(0)" class="btn-numpad py-4">0</button>
                <div class="py-4"></div>
            </div>
        </div>
    </div>

    <!-- ================== MAIN DASHBOARD ================== -->
    <div id="dashboardScreen" class="hidden p-4 md:p-8 max-w-7xl mx-auto pb-24 relative z-10">
        
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 glass-card p-6 rounded-2xl gap-4">
            <div>
                <h1 class="text-3xl md:text-4xl font-bold text-white tracking-tight">Killer<span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400">X</span> <span class="font-light text-slate-300">Panel</span></h1>
                <p class="text-indigo-300/80 text-sm mt-1.5 flex items-center"><i class="fas fa-crown text-yellow-400 mr-2 text-xs"></i> Premium Key Management System</p>
            </div>
            <div class="flex items-center gap-4">
                <div class="bg-green-500/10 text-green-400 px-4 py-2.5 rounded-xl text-sm font-medium border border-green-500/20 flex items-center backdrop-blur-sm">
                    <span class="relative flex h-2.5 w-2.5 mr-2">
                      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                      <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-green-500"></span>
                    </span>
                    System Online & Secured
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <!-- Left Side: Create Key Form -->
            <div class="glass-card p-6 rounded-3xl h-fit lg:col-span-1">
                <h2 class="text-lg font-semibold mb-6 flex items-center text-white border-b border-white/5 pb-4">
                    <div class="p-2 bg-indigo-500/20 rounded-lg mr-3 border border-indigo-500/20 text-indigo-400"><i class="fas fa-bolt"></i></div>
                    Generate License
                </h2>
                
                <div class="space-y-5">
                    <div>
                        <label class="text-xs text-slate-400 font-medium ml-1 uppercase tracking-wider">User Name</label>
                        <input type="text" id="userName" placeholder="e.g. Shezin PC" 
                            class="w-full input-premium rounded-xl px-4 py-3 text-white outline-none mt-1.5">
                    </div>

                    <div>
                        <label class="text-xs text-slate-400 font-medium ml-1 uppercase tracking-wider">Pass Key</label>
                        <div class="relative mt-1.5">
                            <input type="text" id="newKey" placeholder="KX-XXXX" 
                                class="w-full input-premium rounded-xl px-4 py-3 text-white outline-none pr-12 font-mono text-sm">
                            <button onclick="generateRandomKey()" class="absolute right-2 top-2 bottom-2 aspect-square bg-white/5 hover:bg-white/10 rounded-lg text-indigo-400 transition-colors flex items-center justify-center" title="Generate Random">
                                <i class="fas fa-random text-sm"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div>
                        <label class="text-xs text-slate-400 font-medium ml-1 uppercase tracking-wider">Validity (Days)</label>
                        <input type="number" id="days" placeholder="30" value="30"
                            class="w-full input-premium rounded-xl px-4 py-3 text-white outline-none mt-1.5">
                    </div>

                    <button onclick="createKey()" class="w-full btn-primary py-3.5 rounded-xl font-semibold text-white mt-4 flex items-center justify-center gap-2">
                        <i class="fas fa-plus"></i> Create License
                    </button>
                </div>
            </div>

            <!-- Right Side: Key List Table -->
            <div class="lg:col-span-3 glass-card rounded-3xl overflow-hidden flex flex-col">
                <div class="p-6 border-b border-white/5 flex flex-col md:flex-row justify-between items-center gap-4 bg-white/[0.02]">
                    <div class="flex items-center gap-3">
                        <h2 class="text-lg font-semibold text-white flex items-center">
                            <div class="p-2 bg-purple-500/20 rounded-lg mr-3 border border-purple-500/20 text-purple-400"><i class="fas fa-users"></i></div>
                            Manage Users
                        </h2>
                        <span id="keyCount" class="bg-indigo-500/20 text-indigo-300 border border-indigo-500/30 text-xs px-3 py-1 rounded-full font-medium">0 Total</span>
                    </div>
                    
                    <!-- Search Box -->
                    <div class="relative w-full md:w-72 group">
                        <i class="fas fa-search absolute left-4 top-3.5 text-slate-400 group-focus-within:text-indigo-400 transition-colors"></i>
                        <input type="text" id="searchInput" onkeyup="searchTable()" placeholder="Search users or keys..." 
                            class="w-full input-premium rounded-xl pl-11 pr-4 py-2.5 text-sm text-white outline-none">
                    </div>
                </div>
                
                <div class="overflow-x-auto flex-1 p-2">
                    <table class="w-full text-left border-collapse whitespace-nowrap">
                        <thead class="text-slate-400 text-xs uppercase bg-black/20">
                            <tr>
                                <th class="px-5 py-4 font-medium rounded-tl-lg">User Name</th>
                                <th class="px-5 py-4 font-medium">License Key</th>
                                <th class="px-5 py-4 font-medium">Created On</th>
                                <th class="px-5 py-4 font-medium">Expires On</th>
                                <th class="px-5 py-4 font-medium">Status</th>
                                <th class="px-5 py-4 font-medium text-center rounded-tr-lg">Manage</th>
                            </tr>
                        </thead>
                        <tbody id="keyTableBody" class="text-sm divide-y divide-white/5">
                            <!-- Data will load here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- ================== EDIT MODAL ================== -->
    <div id="editModal" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black/80 backdrop-blur-md transition-opacity">
        <div class="glass-card p-8 rounded-3xl w-full max-w-md border border-indigo-500/30 shadow-[0_0_50px_rgba(99,102,241,0.15)] transform transition-all scale-95 opacity-0" id="editModalContent">
            <h3 class="text-xl font-bold text-white mb-6 flex items-center border-b border-white/10 pb-4">
                <i class="fas fa-pen-to-square text-indigo-400 mr-3"></i> Edit License
            </h3>
            <input type="hidden" id="editKeyRef">
            
            <div class="space-y-5">
                <div>
                    <label class="text-xs font-medium text-slate-400 uppercase tracking-wide">User Name</label>
                    <input type="text" id="editUserName" class="w-full input-premium rounded-xl px-4 py-3 text-white outline-none mt-1.5">
                </div>
                <div>
                    <label class="text-xs font-medium text-slate-400 uppercase tracking-wide">Add/Remove Days (Ex: 10 or -5)</label>
                    <input type="number" id="editDays" placeholder="0" value="0" class="w-full input-premium rounded-xl px-4 py-3 text-white outline-none mt-1.5">
                </div>
            </div>

            <div class="flex gap-3 mt-8">
                <button onclick="closeEditModal()" class="flex-1 bg-white/5 hover:bg-white/10 text-white py-3 rounded-xl transition-all font-medium border border-white/10">Cancel</button>
                <button onclick="saveEdit()" class="flex-1 btn-primary text-white py-3 rounded-xl transition-all font-medium shadow-lg shadow-indigo-500/20">Save Updates</button>
            </div>
        </div>
    </div>

    <!-- Floating Developer Badge -->
    <a href="https://wa.me/8801889221262" target="_blank" 
       class="fixed bottom-6 right-6 bg-gradient-to-r from-emerald-500 to-teal-600 text-white px-5 py-3 rounded-full shadow-[0_10px_20px_rgba(16,185,129,0.3)] hover:-translate-y-1 hover:shadow-[0_15px_25px_rgba(16,185,129,0.4)] transition-all flex items-center gap-3 z-40 border border-emerald-400/30">
        <i class="fab fa-whatsapp text-2xl"></i>
        <div class="text-left">
            <p class="text-[9px] uppercase tracking-wider font-bold text-emerald-100 leading-none mb-1">Developer</p>
            <p class="text-sm font-bold leading-none">Shezin Islam</p>
        </div>
    </a>


    <script>
        // --- Helper Function for Exact Date & Time ---
        function formatDateTime(dateObj) {
            return dateObj.toLocaleString('en-US', { 
                month: 'short', day: 'numeric', year: 'numeric', 
                hour: 'numeric', minute: '2-digit', hour12: true 
            });
        }

        // --- Login System (Pin: 5449) ---
        let currentPin = "";
        const correctPin = "5449";
        const dots = document.querySelectorAll('.pin-dot');

        function pressKey(num) {
            if (currentPin.length < 4) {
                currentPin += num;
                updateDots();
                if (currentPin.length === 4) {
                    setTimeout(checkPin, 250);
                }
            }
        }

        function clearPin() {
            currentPin = "";
            updateDots();
        }

        function updateDots() {
            dots.forEach((dot, index) => {
                if (index < currentPin.length) dot.classList.add('filled');
                else dot.classList.remove('filled');
            });
        }

        function checkPin() {
            if (currentPin === correctPin) {
                const loginScreen = document.getElementById('loginScreen');
                loginScreen.style.opacity = '0';
                
                // Show success toast
                Swal.fire({
                    toast: true, position: 'top-end', icon: 'success', title: 'Access Granted',
                    showConfirmButton: false, timer: 1500, background: '#1e293b', color: '#fff'
                });

                setTimeout(() => {
                    loginScreen.style.display = 'none';
                    document.getElementById('dashboardScreen').classList.remove('hidden');
                }, 500);
            } else {
                const pinContainer = document.getElementById('pinDots');
                pinContainer.classList.add('shake');
                setTimeout(() => pinContainer.classList.remove('shake'), 400);
                clearPin();
                
                Swal.fire({
                    toast: true, position: 'top', icon: 'error', title: 'Invalid Passcode!',
                    showConfirmButton: false, timer: 2000, background: '#1e293b', color: '#fff'
                });
            }
        }


        // --- Firebase Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyDpn0JvabsXq2o6xTeQRMvEREh7r0Y4Fzk",
            databaseURL: "https://killerxpanelauth-default-rtdb.firebaseio.com/",
            projectId: "killerxpanelauth",
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const database = firebase.database();

        let allKeysData = []; 

        function generateRandomKey() {
            const random = "KX-" + Math.random().toString(36).substr(2, 8).toUpperCase();
            document.getElementById('newKey').value = random;
        }

        // Auto generate first time
        generateRandomKey();

        function createKey() {
            const userName = document.getElementById('userName').value.trim();
            const keyName = document.getElementById('newKey').value.trim();
            const days = document.getElementById('days').value;
            
            if(!keyName || !days || !userName) {
                Swal.fire({ icon: 'warning', title: 'Missing Info', text: 'Please fill out all fields before creating.' });
                return;
            }

            // Get exact time for creation and expiry
            const now = new Date();
            const creationString = formatDateTime(now);
            
            const expiryDate = new Date();
            expiryDate.setDate(expiryDate.getDate() + parseInt(days));
            const expiryString = formatDateTime(expiryDate);

            database.ref('Keys/' + keyName).set({
                UserName: userName,
                PassKey: keyName,
                CreationDate: creationString,
                ExpiryDate: expiryString,
                HWID: "" 
            }).then(() => {
                document.getElementById('userName').value = '';
                generateRandomKey(); 
                document.getElementById('days').value = '30';
                
                Swal.fire({
                    icon: 'success',
                    title: 'License Created!',
                    text: `Key generated for ${userName}`,
                    timer: 2000,
                    showConfirmButton: false
                });
            });
        }

        database.ref('Keys/').on('value', (snapshot) => {
            allKeysData = [];
            snapshot.forEach((childSnapshot) => {
                allKeysData.push(childSnapshot.val());
            });
            renderTable(allKeysData);
        });

        function renderTable(dataArray) {
            const tbody = document.getElementById('keyTableBody');
            const countLabel = document.getElementById('keyCount');
            tbody.innerHTML = '';
            
            dataArray.reverse().forEach((data) => {
                const isLocked = data.HWID && data.HWID !== "";
                const uName = data.UserName || "Unknown User";
                const cDate = data.CreationDate || "N/A";

                // Extract initials for Avatar
                let initials = "U";
                if(uName !== "Unknown User") {
                    const parts = uName.split(' ');
                    initials = parts.length > 1 ? (parts[0][0] + parts[1][0]).toUpperCase() : parts[0].substring(0, 2).toUpperCase();
                }

                tbody.innerHTML += `
                    <tr class="hover:bg-white/[0.02] transition-colors group">
                        <td class="px-5 py-4">
                            <div class="flex items-center gap-3">
                                <div class="w-9 h-9 rounded-full bg-gradient-to-br from-indigo-500/20 to-purple-500/20 text-indigo-300 flex items-center justify-center text-xs font-bold border border-indigo-500/30 shadow-inner">
                                    ${initials}
                                </div>
                                <span class="font-medium text-slate-200">${uName}</span>
                            </div>
                        </td>
                        <td class="px-5 py-4">
                            <div class="flex items-center gap-2">
                                <span class="font-mono text-purple-300 bg-purple-500/10 px-2.5 py-1 rounded-md border border-purple-500/20 text-xs tracking-wide">${data.PassKey}</span>
                                <button onclick="copyKey('${data.PassKey}')" class="text-slate-500 hover:text-white transition-colors bg-white/5 p-1.5 rounded-md" title="Copy Key">
                                    <i class="fas fa-copy"></i>
                                </button>
                            </div>
                        </td>
                        <td class="px-5 py-4 text-slate-400 text-xs">
                            <div class="flex items-center"><i class="far fa-clock mr-2 text-slate-500"></i> ${cDate}</div>
                        </td>
                        <td class="px-5 py-4 text-slate-300 text-xs font-medium">
                            <div class="flex items-center"><i class="far fa-calendar-times text-rose-400 mr-2"></i> ${data.ExpiryDate}</div>
                        </td>
                        <td class="px-5 py-4">
                            <div class="inline-flex items-center px-2.5 py-1 rounded-full text-[11px] font-medium border ${isLocked ? 'text-amber-400 bg-amber-400/10 border-amber-400/20' : 'text-emerald-400 bg-emerald-400/10 border-emerald-400/20'}">
                                <i class="fas ${isLocked ? 'fa-lock' : 'fa-unlock-keyhole'} mr-1.5"></i>
                                ${isLocked ? 'Hardware Locked' : 'Available'}
                            </div>
                        </td>
                        <td class="px-5 py-4 text-center">
                            <div class="flex items-center justify-center gap-2 opacity-80 group-hover:opacity-100 transition-opacity">
                                <button onclick="openEditModal('${data.PassKey}', '${uName}')" title="Edit User"
                                    class="w-8 h-8 rounded-lg bg-blue-500/10 text-blue-400 hover:bg-blue-500 hover:text-white transition-all flex items-center justify-center">
                                    <i class="fas fa-pen text-xs"></i>
                                </button>
                                <button onclick="resetHWID('${data.PassKey}')" title="Reset HWID" 
                                    class="w-8 h-8 rounded-lg bg-amber-500/10 text-amber-400 hover:bg-amber-500 hover:text-white transition-all flex items-center justify-center ${!isLocked ? 'opacity-30 cursor-not-allowed' : ''}" 
                                    ${!isLocked ? 'disabled' : ''}>
                                    <i class="fas fa-rotate-left text-xs"></i>
                                </button>
                                <button onclick="deleteKey('${data.PassKey}')" title="Delete License"
                                    class="w-8 h-8 rounded-lg bg-rose-500/10 text-rose-400 hover:bg-rose-500 hover:text-white transition-all flex items-center justify-center">
                                    <i class="fas fa-trash text-xs"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            });
            countLabel.innerText = dataArray.length + " Total Licenses";
        }

        // Search Function
        function searchTable() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filteredData = allKeysData.filter(item => {
                const uName = (item.UserName || "").toLowerCase();
                const key = (item.PassKey || "").toLowerCase();
                return uName.includes(query) || key.includes(query);
            });
            renderTable(filteredData);
        }

        // Copy Key
        function copyKey(key) {
            navigator.clipboard.writeText(key).then(() => {
                Swal.fire({
                    toast: true, position: 'bottom-end', icon: 'success', title: 'Copied to clipboard!',
                    showConfirmButton: false, timer: 1500, background: '#1e293b', color: '#fff'
                });
            });
        }

        // --- Edit System ---
        function openEditModal(key, currentName) {
            document.getElementById('editKeyRef').value = key;
            document.getElementById('editUserName').value = currentName === "Unknown User" ? "" : currentName;
            document.getElementById('editDays').value = "0";
            
            const modal = document.getElementById('editModal');
            const content = document.getElementById('editModalContent');
            
            modal.classList.remove('hidden');
            setTimeout(() => {
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function closeEditModal() {
            const content = document.getElementById('editModalContent');
            content.classList.remove('scale-100', 'opacity-100');
            content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                document.getElementById('editModal').classList.add('hidden');
            }, 200);
        }

        function saveEdit() {
            const key = document.getElementById('editKeyRef').value;
            const newName = document.getElementById('editUserName').value.trim();
            const daysToAdd = parseInt(document.getElementById('editDays').value) || 0;

            // BUG FIX: Block saving if Name is empty
            if (!newName) {
                Swal.fire({ icon: 'error', title: 'Error', text: 'User Name cannot be empty!' });
                return;
            }

            database.ref('Keys/' + key).once('value').then((snapshot) => {
                const data = snapshot.val();
                let updates = { UserName: newName };

                if(daysToAdd !== 0) {
                    const currentExpiry = new Date(data.ExpiryDate);
                    currentExpiry.setDate(currentExpiry.getDate() + daysToAdd);
                    updates.ExpiryDate = formatDateTime(currentExpiry);
                }

                database.ref('Keys/' + key).update(updates).then(() => {
                    closeEditModal();
                    Swal.fire({ icon: 'success', title: 'Updated', text: 'User details updated successfully', timer: 1500, showConfirmButton: false });
                });
            });
        }

        // --- Actions ---
        function resetHWID(key) {
            Swal.fire({
                title: 'Reset Hardware ID?',
                text: "The user will be able to log in from a new PC.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#f59e0b',
                cancelButtonColor: '#334155',
                confirmButtonText: 'Yes, Reset HWID'
            }).then((result) => {
                if (result.isConfirmed) {
                    database.ref('Keys/' + key).update({ HWID: "" }).then(() => {
                        Swal.fire('Reset!', 'Hardware ID has been reset.', 'success');
                    });
                }
            });
        }

        function deleteKey(key) {
            Swal.fire({
                title: 'Delete this License?',
                text: "You won't be able to revert this action!",
                icon: 'error',
                showCancelButton: true,
                confirmButtonColor: '#e11d48',
                cancelButtonColor: '#334155',
                confirmButtonText: 'Yes, delete it!'
            }).then((result) => {
                if (result.isConfirmed) {
                    database.ref('Keys/' + key).remove().then(() => {
                        Swal.fire('Deleted!', 'The license has been permanently deleted.', 'success');
                    });
                }
            });
        }
    </script>
</body>
</html>
