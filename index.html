<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Admin Panel | HWID Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #0f172a; color: #e2e8f0; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .btn-primary { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); transition: all 0.3s ease; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4); }
        .status-badge { font-size: 0.7rem; padding: 2px 8px; border-radius: 99px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <div class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-bold text-white">KillerX <span class="text-indigo-500">Admin</span></h1>
                <p class="text-slate-400 text-sm">Pass Key & Device Management</p>
            </div>
            <div class="hidden md:block">
                <span class="bg-green-500/10 text-green-500 px-4 py-2 rounded-full text-xs font-semibold border border-green-500/20">
                    <i class="fas fa-shield-halved mr-2"></i> HWID System Active
                </span>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <!-- Left Side: Create Key Form -->
            <div class="glass-card p-6 rounded-2xl h-fit lg:col-span-1">
                <h2 class="text-xl font-semibold mb-6 flex items-center">
                    <i class="fas fa-plus-circle mr-2 text-indigo-500"></i> New Key
                </h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="text-xs text-slate-400 ml-1">Key Name</label>
                        <input type="text" id="newKey" placeholder="PREMIUM-XXXX" 
                            class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-indigo-500 transition-all">
                    </div>
                    
                    <div>
                        <label class="text-xs text-slate-400 ml-1">Validity (Days)</label>
                        <input type="number" id="days" placeholder="30" 
                            class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-indigo-500 transition-all">
                    </div>

                    <button onclick="generateRandomKey()" class="text-xs text-indigo-400 hover:text-indigo-300">
                        <i class="fas fa-magic mr-1"></i> Random Key
                    </button>

                    <button onclick="createKey()" class="w-full btn-primary py-3 rounded-xl font-semibold text-white mt-4">
                        Create Key
                    </button>
                </div>
            </div>

            <!-- Right Side: Key List Table -->
            <div class="lg:col-span-3 glass-card rounded-2xl overflow-hidden">
                <div class="p-6 border-b border-slate-700 flex justify-between items-center">
                    <h2 class="text-xl font-semibold italic">Manage Keys</h2>
                    <span id="keyCount" class="bg-indigo-500 text-white text-xs px-2 py-1 rounded">0 Total</span>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-800/50 text-slate-400 text-xs uppercase">
                            <tr>
                                <th class="px-6 py-4">Key</th>
                                <th class="px-6 py-4">Expiry Date</th>
                                <th class="px-6 py-4">HWID Status</th>
                                <th class="px-6 py-4 text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="keyTableBody" class="text-sm divide-y divide-slate-800">
                            <!-- Data will load here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Firebase Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyDpn0JvabsXq2o6xTeQRMvEREh7r0Y4Fzk",
            databaseURL: "https://killerxpanelauth-default-rtdb.firebaseio.com/",
            projectId: "killerxpanelauth",
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function generateRandomKey() {
            const random = "KX-" + Math.random().toString(36).substr(2, 8).toUpperCase();
            document.getElementById('newKey').value = random;
        }

        function createKey() {
            const keyName = document.getElementById('newKey').value.trim();
            const days = document.getElementById('days').value;
            if(!keyName || !days) return alert("Fill all fields!");

            const expiryDate = new Date();
            expiryDate.setDate(expiryDate.getDate() + parseInt(days));
            const dateString = expiryDate.toISOString().split('T')[0];

            database.ref('Keys/' + keyName).set({
                PassKey: keyName,
                ExpiryDate: dateString,
                HWID: "" // শুরুতে খালি থাকবে
            }).then(() => {
                alert("Key Created Successfully!");
                document.getElementById('newKey').value = '';
            });
        }

        // Real-time listener for table
        database.ref('Keys/').on('value', (snapshot) => {
            const tbody = document.getElementById('keyTableBody');
            const countLabel = document.getElementById('keyCount');
            tbody.innerHTML = '';
            let count = 0;

            snapshot.forEach((childSnapshot) => {
                const data = childSnapshot.val();
                const isLocked = data.HWID && data.HWID !== "";

                tbody.innerHTML += `
                    <tr class="hover:bg-slate-800/30 transition-all">
                        <td class="px-6 py-4 font-mono text-indigo-400 font-bold">${data.PassKey}</td>
                        <td class="px-6 py-4 text-slate-300">${data.ExpiryDate}</td>
                        <td class="px-6 py-4">
                            <span class="${isLocked ? 'text-orange-400 bg-orange-400/10' : 'text-green-400 bg-green-400/10'} status-badge border border-current/20">
                                <i class="fas ${isLocked ? 'fa-lock' : 'fa-unlock'} mr-1"></i>
                                ${isLocked ? 'Locked to Device' : 'Available'}
                            </span>
                        </td>
                        <td class="px-6 py-4 text-center space-x-3">
                            <button onclick="resetHWID('${data.PassKey}')" title="Reset HWID" 
                                class="text-yellow-500 hover:bg-yellow-500/10 p-2 rounded-lg transition-all ${!isLocked ? 'opacity-30 cursor-not-allowed' : ''}" 
                                ${!isLocked ? 'disabled' : ''}>
                                <i class="fas fa-undo-alt"></i> Reset
                            </button>
                            <button onclick="deleteKey('${data.PassKey}')" title="Delete Key"
                                class="text-red-500 hover:bg-red-500/10 p-2 rounded-lg transition-all">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </td>
                    </tr>
                `;
                count++;
            });
            countLabel.innerText = count + " Total";
        });

        // HWID রিসেট করার ফাংশন
        function resetHWID(key) {
            if(confirm(`Are you sure you want to RESET HWID for ${key}? This will allow the user to use a different PC.`)) {
                database.ref('Keys/' + key).update({
                    HWID: ""
                }).then(() => {
                    alert("HWID Reset Success!");
                });
            }
        }

        function deleteKey(key) {
            if(confirm("Delete this key forever?")) {
                database.ref('Keys/' + key).remove();
            }
        }
    </script>
</body>
</html>
